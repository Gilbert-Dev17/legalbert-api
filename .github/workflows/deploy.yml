name: Deploy to Azure VM

on:
  push:
    branches:
          - main  # Change this if your branch name is different

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands using ssh-key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # 1. Navigate to your project folder
            cd ~/legalbert-api

            # 2. Sync the latest code from GitHub
            git pull origin main

            # 3. Enter your virtual environment and update libraries
            source venv/bin/activate
            pip install -r requirements.txt

            # 4. Stop the old API and start the new one in the background
            # 'pkill' finds the old uvicorn process and stops it
            pkill uvicorn || true

            # 'nohup' keeps the API running even after the SSH session ends
            nohup uvicorn main:app --host 0.0.0.0 --port 8000 > output.log 2>&1 &