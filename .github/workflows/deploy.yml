name: Deploy to Azure VM

on:
  push:
    branches:
          - main  # Change this if your branch name is different

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Executing remote ssh commands using ssh-key
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/legalbert-api
            git pull origin main
            # Rebuild the Docker image to include new Supabase/OCR dependencies
            docker build -t legalbert-api .
            # Stop existing container if it's running
            docker stop legalbert-app || true
            docker rm legalbert-app || true
            # Run the updated container
            docker run -d --name legalbert-app -p 80:80 --env-file .env legalbert-api